# Railway deploy for the @jenz/api backend → skills.jenz.ai.
# Frontend deploys to Cloudflare; the MCP server is a local stdio process (npx),
# so neither is built or served here. This service is the Hono API only.

[build]
builder = "NIXPACKS"
# Install, typecheck as a deploy gate, generate the Prisma client. No tsc build:
# we run the TS source directly with tsx (tsconfig uses bundler-style extensionless
# imports, which `node dist` can't resolve under ESM).
buildCommand = "pnpm install --frozen-lockfile && pnpm -r typecheck && pnpm --filter @jenz/api exec prisma generate"

[deploy]
# Apply any pending Prisma migrations (idempotent), then boot the API via tsx.
startCommand = "pnpm --filter @jenz/api exec prisma migrate deploy && pnpm --filter @jenz/api exec tsx src/index.ts"
healthcheckPath = "/healthz"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
