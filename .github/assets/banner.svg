<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" fill="none" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0712"/>
      <stop offset="0.55" stop-color="#150a26"/>
      <stop offset="1" stop-color="#1c0c3b"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a06bff"/>
      <stop offset="1" stop-color="#7e14ff"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9c8ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#863bff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#863bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="420" rx="0" fill="url(#bg)"/>
  <circle cx="210" cy="210" r="230" fill="url(#glow)"/>
  <circle cx="1120" cy="60" r="180" fill="#47bfff" opacity="0.10" filter="url(#soft)"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.035">
    <line x1="0" y1="105" x2="1280" y2="105"/>
    <line x1="0" y1="210" x2="1280" y2="210"/>
    <line x1="0" y1="315" x2="1280" y2="315"/>
  </g>

  <!-- logo mark (jenz bolt) -->
  <g transform="translate(96 132) scale(3.1)">
    <path fill="url(#brand)" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="280" y="172" fill="url(#wordmark)" font-size="62" font-weight="800" letter-spacing="-1.5">Jenz Managed Skills</text>
  <text x="282" y="220" fill="#b79bff" font-size="25" font-weight="600" letter-spacing="0.2">The security gate for AI-agent skills</text>
  <text x="282" y="262" fill="#8f8aa3" font-size="20" font-weight="400">Audits skills for prompt injection &amp; malicious code — serves only what's safe.</text>

  <!-- pills -->
  <g font-size="16" font-weight="600">
    <g transform="translate(282 300)">
      <rect width="168" height="38" rx="19" fill="#863bff" fill-opacity="0.14" stroke="#863bff" stroke-opacity="0.55"/>
      <text x="22" y="25" fill="#c9b3ff">Open-weight only</text>
    </g>
    <g transform="translate(466 300)">
      <rect width="150" height="38" rx="19" fill="#47bfff" fill-opacity="0.12" stroke="#47bfff" stroke-opacity="0.5"/>
      <text x="22" y="25" fill="#9bd9ff">Fail-closed</text>
    </g>
    <g transform="translate(632 300)">
      <rect width="184" height="38" rx="19" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.25"/>
      <text x="22" y="25" fill="#d7d2e6">Host decides verdict</text>
    </g>
    <g transform="translate(832 300)">
      <rect width="148" height="38" rx="19" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.25"/>
      <text x="22" y="25" fill="#d7d2e6">MIT · MCP</text>
    </g>
  </g>
</svg>
